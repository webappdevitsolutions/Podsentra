<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Podsecntra | Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="login">
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">Podsecntra</a>
      <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">Menu</button>
      <nav class="nav-links" id="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="admin-dashboard.html">Admin</a>
        <a href="login.html">Login</a>
      </nav>
      <div class="nav-actions">
        <div id="nav-user" class="nav-user"></div>
        <a class="cart-link" href="cart.html">Cart <span id="cart-count">0</span></a>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container auth-wrap">
      <div class="auth-panel">
        <div class="auth-switch">
          <button id="show-login" class="btn btn-small btn-primary">Login</button>
          <button id="show-register" class="btn btn-small btn-light">Register</button>
        </div>
        <p id="auth-message" class="status-msg"></p>

        <form id="login-form">
          <h2>Welcome Back</h2>
          <label>Email</label>
          <input type="email" id="login-email" required>
          <label>Password</label>
          <input type="password" id="login-password" required>
          <button class="btn btn-primary" type="submit">Login</button>
        </form>

        <form id="register-form" class="hidden">
          <h2>Create Account</h2>
          <label>Name</label>
          <input type="text" id="register-name" required>
          <label>Email</label>
          <input type="email" id="register-email" required>
          <label>Password</label>
          <input type="password" id="register-password" required>
          <button class="btn btn-primary" type="submit">Register</button>
        </form>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Podsecntra powered by HTML, CSS, JavaScript, Node.js, and Cashfree Payments.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
