<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Podsecntra | Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="admin">
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">Podsecntra</a>
      <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">Menu</button>
      <nav class="nav-links" id="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="admin-dashboard.html">Admin</a>
        <a href="login.html">Login</a>
      </nav>
      <div class="nav-actions">
        <div id="nav-user" class="nav-user"></div>
        <a class="cart-link" href="cart.html">Cart <span id="cart-count">0</span></a>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <h1>Legacy Admin Product Manager</h1>
      <p class="soft-text">Add, edit, or delete products. Management has moved to the new Podsecntra admin dashboard.</p>

      <div class="admin-grid">
        <div class="card">
          <h2 id="admin-form-title">Add Product</h2>
          <p id="admin-auth-message" class="status-msg"></p>
          <form id="admin-product-form">
            <input type="hidden" id="admin-product-id">
            <label>Name</label>
            <input type="text" id="admin-name" required>
            <label>Category</label>
            <input type="text" id="admin-category" required>
            <label>Price</label>
            <input type="number" id="admin-price" min="1" step="0.01" required>
            <label>Stock</label>
            <input type="number" id="admin-stock" min="0" step="1" required>
            <label>Rating (1 to 5)</label>
            <input type="number" id="admin-rating" min="1" max="5" step="0.1" required>
            <label>Image URL</label>
            <input type="url" id="admin-image" required>
            <label>Or Upload Image</label>
            <input type="file" id="admin-image-file" accept="image/*">
            <button class="btn btn-light btn-small" type="button" id="admin-upload-btn">Upload to Cloudinary</button>
            <label>Description</label>
            <textarea id="admin-description" rows="4" required></textarea>
            <div class="btn-row">
              <button class="btn btn-primary" type="submit" id="admin-save-btn">Save Product</button>
              <button class="btn btn-light" type="button" id="admin-cancel-btn">Cancel</button>
            </div>
          </form>
        </div>

        <div class="card">
          <h2>Product List</h2>
          <div id="admin-products-list"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Podsecntra powered by HTML, CSS, JavaScript, Node.js, and Cashfree Payments.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
